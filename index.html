    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #000000;
        margin: 0;
      }
      .startup-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #ffffff;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-color-scheme: light) {
        #root:empty { background-color: #ffffff; }
        .startup-spinner { border-top-color: #000000; border-color: rgba(0, 0, 0, 0.1); }
      }
    </style>
</head>

  <body>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <div id="root"><div class="startup-spinner"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
