<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Conversion Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .test-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .result {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 5px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌍 Currency Conversion Test</h1>

        <div class="test-section">
            <h3>Test 1: Fetch Exchange Rates</h3>
            <button onclick="testFetchRates()">Fetch Current Rates</button>
            <div id="rates-result" class="result"></div>
        </div>

        <div class="test-section">
            <h3>Test 2: Convert Course Prices</h3>
            <button onclick="testConvertPrices()">Convert $50 Course</button>
            <button onclick="testConvertPrices(100)">Convert $100 Course</button>
            <button onclick="testConvertPrices(1500)">Convert $1500 Course</button>
            <div id="convert-result" class="result"></div>
        </div>

        <div class="test-section">
            <h3>Test 3: Payment Amounts (Paystack Format)</h3>
            <button onclick="testPaymentAmounts()">Get Payment Amounts</button>
            <div id="payment-result" class="result"></div>
        </div>

        <div class="test-section">
            <h3>Test 4: Currency Formatting</h3>
            <button onclick="testFormatting()">Test Formatting</button>
            <div id="format-result" class="result"></div>
        </div>
    </div>

    <script type="module">
        // Import the currency converter functions
        // Note: This is a simplified test - in production, import from the actual module

        const FALLBACK_RATES = {
            USD: 1,
            KES: 129.50,
            GHS: 15.80,
            NGN: 1650,
            ZAR: 18.50,
        };

        let cachedRates = null;
        let lastFetchTime = 0;
        const CACHE_DURATION = 3600000;

        async function fetchExchangeRates() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                return {
                    USD: 1,
                    KES: data.rates.KES || FALLBACK_RATES.KES,
                    GHS: data.rates.GHS || FALLBACK_RATES.GHS,
                    NGN: data.rates.NGN || FALLBACK_RATES.NGN,
                    ZAR: data.rates.ZAR || FALLBACK_RATES.ZAR,
                };
            } catch (error) {
                console.warn('Using fallback rates:', error);
                return FALLBACK_RATES;
            }
        }

        async function getExchangeRates() {
            const now = Date.now();
            if (cachedRates && (now - lastFetchTime) < CACHE_DURATION) {
                return cachedRates;
            }
            cachedRates = await fetchExchangeRates();
            lastFetchTime = now;
            return cachedRates;
        }

        async function convertFromUSD(usdAmount, targetCurrency) {
            const rates = await getExchangeRates();
            const exchangeRate = rates[targetCurrency] || 1;
            const convertedAmount = Math.round(usdAmount * exchangeRate * 100) / 100;
            return {
                amount: convertedAmount,
                currency: targetCurrency,
                usdEquivalent: usdAmount,
                exchangeRate,
            };
        }

        async function getPaymentAmount(usdPrice, currency) {
            const conversion = await convertFromUSD(usdPrice, currency);
            return Math.round(conversion.amount * 100);
        }

        function formatCurrency(amount, currency) {
            const symbols = {
                USD: '$',
                KES: 'KES',
                GHS: 'GH₵',
                NGN: '₦',
                ZAR: 'R',
            };
            const symbol = symbols[currency] || currency;
            const formatted = new Intl.NumberFormat('en-US', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2,
            }).format(amount);
            return currency === 'USD' ? `${symbol}${formatted}` : `${symbol} ${formatted}`;
        }

        // Make functions available globally
        window.testFetchRates = async function () {
            const result = document.getElementById('rates-result');
            result.innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching rates...</p></div>';

            try {
                const rates = await getExchangeRates();
                result.innerHTML = `
                    <div class="success">✓ Successfully fetched exchange rates:</div>
                    <pre>${JSON.stringify(rates, null, 2)}</pre>
                    <small>Last updated: ${new Date().toLocaleString()}</small>
                `;
            } catch (error) {
                result.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        };

        window.testConvertPrices = async function (usdPrice = 50) {
            const result = document.getElementById('convert-result');
            result.innerHTML = '<div class="loading"><div class="spinner"></div><p>Converting...</p></div>';

            try {
                const currencies = ['KES', 'GHS', 'NGN', 'ZAR'];
                const conversions = await Promise.all(
                    currencies.map(curr => convertFromUSD(usdPrice, curr))
                );

                let html = `<div class="success">✓ Converted $${usdPrice} USD to:</div>`;
                conversions.forEach(conv => {
                    html += `<div style="margin: 10px 0;">
                        <strong>${conv.currency}:</strong> ${formatCurrency(conv.amount, conv.currency)}
                        <small>(Rate: ${conv.exchangeRate})</small>
                    </div>`;
                });
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        };

        window.testPaymentAmounts = async function () {
            const result = document.getElementById('payment-result');
            result.innerHTML = '<div class="loading"><div class="spinner"></div><p>Calculating...</p></div>';

            try {
                const courses = [
                    { name: 'Standard Course', price: 50 },
                    { name: 'Freelancing Course', price: 100 },
                    { name: 'Teacher Prep', price: 1500 }
                ];

                let html = '<div class="success">✓ Paystack payment amounts (in kobo/pesewas/cents):</div>';

                for (const course of courses) {
                    html += `<div style="margin: 15px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 5px;">
                        <strong>${course.name} ($${course.price})</strong><br>`;

                    const kesAmount = await getPaymentAmount(course.price, 'KES');
                    const ghsAmount = await getPaymentAmount(course.price, 'GHS');

                    html += `
                        • KES: ${kesAmount.toLocaleString()} kobo (${formatCurrency(kesAmount / 100, 'KES')})<br>
                        • GHS: ${ghsAmount.toLocaleString()} pesewas (${formatCurrency(ghsAmount / 100, 'GHS')})
                    </div>`;
                }

                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        };

        window.testFormatting = function () {
            const result = document.getElementById('format-result');

            const tests = [
                { amount: 50, currency: 'USD' },
                { amount: 6475, currency: 'KES' },
                { amount: 790, currency: 'GHS' },
                { amount: 82500, currency: 'NGN' },
                { amount: 925, currency: 'ZAR' },
            ];

            let html = '<div class="success">✓ Currency formatting examples:</div>';
            tests.forEach(test => {
                html += `<div style="margin: 10px 0;">
                    ${test.amount} ${test.currency} → <strong>${formatCurrency(test.amount, test.currency)}</strong>
                </div>`;
            });

            result.innerHTML = html;
        };

        // Auto-run first test on load
        window.addEventListener('load', () => {
            setTimeout(() => testFetchRates(), 500);
        });
    </script>
</body>

</html>
